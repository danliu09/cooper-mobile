    # ============================================================
    # COOPER AI mobile/web app (added 2026-03-22)
    # Static web app at /ai/, API proxied to analyticsdev2
    #
    # To add a new domain: add one line to the map block above
    # and start the REST API server on analyticsdev2.
    # ============================================================

    # COOPER AI static web app
    location ^~ /ai/ {
        alias /var/www/analytics-hub/ai/;
        try_files $uri $uri/ /ai/index.html;
    }

    # COOPER API proxy — routes /ai/api/{domain}/* to analyticsdev2 REST API
    location ~ ^/ai/api/(\w+)/(.*) {
        set $cooper_domain $1;
        set $cooper_path $2;

        # Map domain short name to port
        set $cooper_port "";
        if ($cooper_domain = "reliability")  { set $cooper_port 4001; }
        if ($cooper_domain = "hr")           { set $cooper_port 4002; }
        if ($cooper_domain = "weather")      { set $cooper_port 4003; }
        if ($cooper_domain = "scada")        { set $cooper_port 4004; }
        if ($cooper_domain = "oms")          { set $cooper_port 4005; }
        if ($cooper_domain = "ccb")          { set $cooper_port 4006; }
        if ($cooper_domain = "eip")          { set $cooper_port 4007; }
        if ($cooper_domain = "ami")          { set $cooper_port 4008; }
        if ($cooper_domain = "ellipse")      { set $cooper_port 4009; }
        if ($cooper_domain = "wms")          { set $cooper_port 4010; }

        # Reject unknown domains
        if ($cooper_port = "") { return 404; }

        proxy_pass http://analyticsdev2.smeco.com:$cooper_port/api/$cooper_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
